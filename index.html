<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake Dana Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    /* Header */
    .badge {
      font-size: 13px;
      color: #6b7280;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      color: #111827;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    h1 span {
      color: #2563eb;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      text-align: center;
      margin-bottom: 24px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      margin-bottom: 16px;
    }

    /* Form */
    .label {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
      display: block;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 8px;
    }

    .input-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7280;
      font-size: 16px;
    }

    input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: white;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input::placeholder {
      color: #9ca3af;
    }

    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 20px;
    }

    /* Button */
    .generate-btn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn:hover:not(:disabled) {
      background: #1d4ed8;
    }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .generate-btn.loading .spinner {
      display: block;
    }

    .generate-btn.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      color: #dc2626;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }

    /* Result */
    .result-section {
      display: none;
    }

    .result-section.show {
      display: block;
    }

    .result-label {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 12px;
      display: block;
    }

    .result-image {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 16px;
    }

    .result-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .result-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .download-btn, .reset-btn {
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s;
    }

    .download-btn {
      background: #2563eb;
      color: white;
    }

    .download-btn:hover {
      background: #1d4ed8;
    }

    .reset-btn {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }

    .reset-btn:hover {
      background: #e5e7eb;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="badge">Generator Tool</div>
    <h1>Fake <span>Dana</span> Generator</h1>
    <p class="subtitle">Masukkan nominal dan generate screenshot Dana palsu</p>

    <!-- Main Card -->
    <div class="card">
      <!-- Form -->
      <div class="label">Nominal Dana</div>
      <div class="input-wrapper">
        <span class="input-prefix">Rp</span>
        <input type="text" id="nominal" placeholder="100.000" autocomplete="off">
      </div>
      <div class="hint">Contoh: 10000 atau 1500000</div>

      <!-- Error Message -->
      <div class="error" id="error"></div>

      <!-- Generate Button -->
      <button class="generate-btn" id="generateBtn">
        <span class="spinner"></span>
        <span class="btn-text">⚡ Generate</span>
      </button>
    </div>

    <!-- Result Section -->
    <div class="result-section" id="resultSection">
      <span class="result-label">Hasil Generate</span>
      <div class="result-image">
        <img id="resultImg" src="" alt="Dana result">
      </div>
      <div class="result-actions">
        <button class="download-btn" id="downloadBtn">↓ Download</button>
        <button class="reset-btn" id="resetBtn">✕ Reset</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">For educational purposes only — not affiliated with Dana</div>
  </div>

  <script>
    const nominalInput = document.getElementById('nominal');
    const generateBtn = document.getElementById('generateBtn');
    const errorDiv = document.getElementById('error');
    const resultSection = document.getElementById('resultSection');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    let currentBlob = null;

    // Format rupiah saat mengetik
    nominalInput.addEventListener('input', function(e) {
      let value = this.value.replace(/\D/g, '');
      if (value) {
        this.value = new Intl.NumberFormat('id-ID').format(value);
      }
    });

    // Enter untuk generate
    nominalInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        generate();
      }
    });

    // Generate function
    async function generate() {
      // Reset error
      errorDiv.classList.remove('show');
      
      // Ambil nominal
      let raw = nominalInput.value.replace(/\./g, '');
      
      // Validasi
      if (!raw || isNaN(raw) || Number(raw) <= 0) {
        errorDiv.textContent = '⚠ Masukkan nominal yang valid.';
        errorDiv.classList.add('show');
        return;
      }

      // Loading state
      generateBtn.classList.add('loading');
      generateBtn.disabled = true;
      resultSection.classList.remove('show');

      try {
        // Panggil API
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ angka: raw })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Gagal generate');
        }

        // Tampilkan hasil
        const blob = await response.blob();
        currentBlob = blob;
        const imageUrl = URL.createObjectURL(blob);
        resultImg.src = imageUrl;
        resultSection.classList.add('show');
        
      } catch (error) {
        errorDiv.textContent = '⚠ ' + error.message;
        errorDiv.classList.add('show');
      } finally {
        // Hapus loading state
        generateBtn.classList.remove('loading');
        generateBtn.disabled = false;
      }
    }

    // Download
    downloadBtn.addEventListener('click', function() {
      if (!currentBlob) return;
      
      const url = URL.createObjectURL(currentBlob);
      const a = document.createElement('a');
      a.href = url;
      const nominal = nominalInput.value.replace(/\./g, '');
      a.download = `dana-${nominal}.png`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Reset
    resetBtn.addEventListener('click', function() {
      nominalInput.value = '';
      resultSection.classList.remove('show');
      errorDiv.classList.remove('show');
      currentBlob = null;
      resultImg.src = '';
      nominalInput.focus();
    });

    // Event listener untuk generate button
    generateBtn.addEventListener('click', generate);
  </script>
</body>
</html>
