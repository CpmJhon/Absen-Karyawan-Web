<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Fake Dana Generator</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="badge">Generator Tool</div>
        <h1>Fake<br><span>Dana</span><br>Generator</h1>
        <p class="subtitle">Masukkan nominal dan generate screenshot Dana palsu</p>

        <!-- Main Card -->
        <div class="card">
            <div class="label">Nominal Dana</div>
            <div class="input-wrapper">
                <span class="prefix">Rp</span>
                <input type="text" id="nominalInput" placeholder="100.000" inputmode="numeric" autocomplete="off">
            </div>
            <div class="hint">Contoh: 10000 atau 1500000</div>
            
            <button class="generate-btn" id="generateBtn">
                <span class="spinner"></span>
                <span class="btn-text">⚡ Generate</span>
            </button>
            
            <div class="error" id="errorMsg"></div>
        </div>

        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <span class="result-label">Hasil Generate</span>
            <img id="resultImage" class="result-image" src="" alt="Generated Dana">
            
            <div class="action-grid">
                <button class="download-btn" id="downloadBtn">↓ Download</button>
                <button class="reset-btn" id="resetBtn">✕ Reset</button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">For educational purposes only — not affiliated with Dana</div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
